<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>verificar cupón · meowrhino.studio</title>
  <meta name="description" content="verifica tu cupón de descuento de meowrhino.studio">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <div class="lang-selector">
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ca">CA</button>
    </div>

    <div class="verify-card">
      <h3 data-i18n="verifyTitle">verificar cupón</h3>
      <p data-i18n="verifySubtitle">introduce el código del cupón para comprobar su validez</p>
      <div class="verify-input-group">
        <input type="text" id="codeInput" data-i18n-placeholder="codePlaceholder" placeholder="MR-XXXX-XXXX">
        <button class="btn-primary" id="btnVerify" data-i18n="verify">verificar</button>
      </div>
      <div id="verifyResult" class="verify-result" style="display:none;">
        <div class="result-status" id="resultStatus"></div>
        <div class="result-detail" id="resultDetail"></div>
      </div>
    </div>

    <div class="branding-badge">
      <a href="https://meowrhino.studio" target="_blank" rel="noopener">meowrhino.studio</a>
    </div>
  </div>

  <div id="notification" class="notification"></div>
  <script src="i18n.js"></script>
  <script src="verificar.js"></script>
</body>
</html>
